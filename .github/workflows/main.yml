name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup vcpkg manually
      shell: pwsh
      run: |
        cd C:\
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Install dependencies via vcpkg
      shell: pwsh
      run: |
        C:\vcpkg\vcpkg.exe integrate install
        C:\vcpkg\vcpkg.exe install qtbase:x64-windows openssl:x64-windows curl:x64-windows nlohmann-json:x64-windows

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build `
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows

    - name: Build Project
      run: |
        cmake --build build --config Release

    - name: Deploy Qt DLLs
      shell: pwsh
      run: |
        $windeployqt = Get-ChildItem -Path "C:/vcpkg/installed/x64-windows/tools" -Recurse -Filter "windeployqt.exe" | Select-Object -First 1 -ExpandProperty FullName
        if ($windeployqt) {
          & $windeployqt --release build/Release/EsetKeys.exe
        }
        Copy-Item -Path "C:/vcpkg/installed/x64-windows/bin/*.dll" -Destination "build/Release/" -Force

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EsetKeys-Windows-Release
        path: build/
